<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Orçamento Freelancer</title>

    <!-- Link do CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>💻 Simulador de Orçamento Freelancer</h1>

    <p>Selecione os serviços desejados:</p>

    <!-- Serviços -->
    <div class="servico">
        <input type="checkbox" value="800" class="item"> Landing Page (R$ 800)
    </div>

    <div class="servico">
        <input type="checkbox" value="1500" class="item"> Site Institucional (R$ 1500)
    </div>

    <div class="servico">
        <input type="checkbox" value="3000" class="item"> E-commerce (R$ 3000)
    </div>

    <div class="servico">
        <input type="checkbox" value="1200" class="item"> Integração de API (R$ 1200)
    </div>

    <div class="servico">
        <input type="checkbox" value="1000" class="item"> Banco de Dados (R$ 1000)
    </div>

    <div class="servico">
        <input type="checkbox" value="50" class="item"> Hospedagem (R$ 50/mês)
    </div>

    <div class="servico">
        <input type="checkbox" value="300" class="item"> Manutenção (R$ 300/mês)
    </div>

    <!-- Total -->
    <h2>Total: R$ <span id="total">0.00</span></h2>

    <!-- Link do JavaScript -->
    <script src="script.js"></script>

</body>
</html>
